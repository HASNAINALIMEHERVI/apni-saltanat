<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; }
    </style>
</head>
<body>
<div style="position:fixed; top:0; left:0; width:100%; height:100vh; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px; font-family:'Inter', sans-serif;">
    <div style="background:#141417; border:1px solid #2a2a2e; border-radius:18px; padding:30px 25px; max-width:380px; width:100%; box-shadow: 0 25px 60px rgba(0,0,0,0.8); text-align:center; color:#fff;">
        <div style="display:flex; justify-content:center; align-items:center; margin-bottom:12px; gap:12px;">
            <i class="fab fa-cc-visa" style="font-size:28px; color:#fff;"></i>
            <i class="fab fa-cc-mastercard" style="font-size:28px; color:#ff9800;"></i>
            <i class="fab fa-cc-amex" style="font-size:28px; color:#2196f3;"></i>
        </div>
        <h2 style="font-size:18px; font-weight:900; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; color:#fff;">Integrate Payment</h2>
        <p style="color:#999; font-size:11px; margin-bottom:25px; line-height:1.5;">
            Sardaar, you are currently <span style="color:#ffcc00; font-weight:bold;">UNPAID</span>.<br>Pay your monthly fee of <strong>1000 PKR</strong> to unlock dashboard.
        </p>
        
        <div style="text-align:left; background:#0f0f11; padding:20px; border-radius:14px; border:1px solid #222;">
            <div style="margin-bottom: 15px;">
                <label style="font-size:10px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; margin-left:3px; display:block; margin-bottom:6px;">Cardholder Name</label>
                <div style="position:relative;">
                    <i class="fas fa-user" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#666; font-size:12px;"></i>
                    <input type="text" placeholder="John Doe" style="width:100%; padding:12px 12px 12px 35px; background:#1a1a1e; border:1px solid #333; border-radius:10px; color:#fff; font-size:12px; outline:none; transition:0.3s;" onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='#333'">
                </div>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size:10px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; margin-left:3px; display:block; margin-bottom:6px;">Card Number</label>
                <div style="position:relative;">
                    <i class="fas fa-credit-card" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#666; font-size:12px;"></i>
                    <input type="text" placeholder="0000 0000 0000 0000" style="width:100%; padding:12px 12px 12px 35px; background:#1a1a1e; border:1px solid #333; border-radius:10px; color:#fff; font-size:13px; letter-spacing:1px; font-family:monospace; outline:none; transition:0.3s;" onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='#333'" maxlength="19">
                </div>
            </div>
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label style="font-size:10px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; margin-left:3px; display:block; margin-bottom:6px;">Expiry</label>
                    <div style="position:relative;">
                        <i class="fas fa-calendar-alt" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#666; font-size:12px;"></i>
                        <input type="text" placeholder="MM/YY" style="width:100%; padding:12px 12px 12px 32px; background:#1a1a1e; border:1px solid #333; border-radius:10px; color:#fff; font-size:12px; outline:none; transition:0.3s;" onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='#333'" maxlength="5">
                    </div>
                </div>
                <div style="flex:1;">
                    <label style="font-size:10px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; margin-left:3px; display:block; margin-bottom:6px;">CVC</label>
                    <div style="position:relative;">
                        <i class="fas fa-lock" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#666; font-size:12px;"></i>
                        <input type="password" placeholder="•••" style="width:100%; padding:12px 12px 12px 32px; background:#1a1a1e; border:1px solid #333; border-radius:10px; color:#fff; font-size:12px; letter-spacing:2px; outline:none; transition:0.3s;" onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='#333'" maxlength="4">
                    </div>
                </div>
            </div>
        </div>
        
        <button id="paySubBtnG" style="width:100%; background:linear-gradient(135deg, #00ff88, #00cc6a); color:#000; font-weight:900; font-size:14px; padding:15px; border-radius:12px; border:none; margin-top:20px; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:0.3s; box-shadow: 0 8px 20px rgba(0, 255, 136, 0.25);">
            PAY 1000 PKR
        </button>
        <button id="cancelPayBtnG" style="width:100%; background:transparent; color:#ff4444; font-weight:bold; font-size:11px; padding:12px; border-radius:12px; border:none; margin-top:5px; cursor:pointer; transition:0.3s; text-decoration:underline;">
            Logout / Cancel
        </button>
    </div>
</div>
</body>
</html>
