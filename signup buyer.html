<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apni Saltanat | Buyer Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff88">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #0a0a0c;
            --accent-blue: #2196f3;
            --accent-purple: #9c27b0;
            --border-color: #eeeeee;
            --shadow-md: 0 10px 25px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-card {
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            text-align: center;
        }

        .header { margin-bottom: 30px; }
        .header p { font-size: 11px; font-weight: 800; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
        .header h2 { font-size: 28px; font-weight: 900; letter-spacing: -1px; }

        .field { margin-bottom: 20px; text-align: left; }
        .field label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; font-weight: 800; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 15px; }
        .shahi-input {
            width: 100%; padding: 14px 20px 14px 50px; background: #fff; border: 1px solid var(--border-color);
            border-radius: 15px; color: #000; outline: none; transition: var(--transition); font-size: 15px;
        }
        .shahi-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(33, 150, 243, 0.1); }

        .btn-shahi {
            width: 100%; padding: 18px; 
            background: #1a1a1e; 
            color: #fff;
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer;
            transition: var(--transition); text-transform: uppercase; margin-top: 10px;
            letter-spacing: 1px; font-size: 13px;
        }
        .btn-shahi:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); background: #000; }
        .btn-shahi:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        #msg { text-align: center; font-size: 13px; margin-top: 20px; font-weight: 700; min-height: 20px; }
        .link-text { margin-top: 20px; font-size: 14px; color: #888; }
        .link-text a { color: var(--accent-blue); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="signup-card">
    <div class="header">
        <p>Join as Buyer</p>
        <h2>SIGNUP</h2>
    </div>

    <div class="field">
        <label>Full Name</label>
        <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" id="name" class="shahi-input" placeholder="e.g. Hasnain Ali">
        </div>
    </div>

    <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" class="shahi-input" placeholder="name@example.com">
        </div>
    </div>

    <div class="field">
        <label>Contact Number</label>
        <div class="input-wrap">
            <i class="fas fa-phone"></i>
            <input type="tel" id="phone" class="shahi-input" placeholder="03XXXXXXXXX">
        </div>
    </div>

    <div class="field">
        <label>Password</label>
        <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" class="shahi-input" placeholder="••••••••">
        </div>
    </div>

    <button class="btn-shahi" id="signupBtn">CREATE ACCOUNT</button>

    <p id="msg"></p>
    
    <div class="link-text">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCsIZ_H0sJddEkiPHfuMPlLNvjxn-1Jzbc",
        authDomain: "apnisaltanat.com",
        databaseURL: "https://apni-saltanat-default-rtdb.firebaseio.com",
        projectId: "apni-saltanat",
        storageBucket: "apni-saltanat.firebasestorage.app",
        messagingSenderId: "691941073239",
        appId: "1:691941073239:web:9e0b568eccc347a0c0de12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const signupBtn = document.getElementById('signupBtn');
    const msg = document.getElementById('msg');

    signupBtn.addEventListener('click', async () => {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        if(!name || !email || !phone || !password) {
            showMsg("Please fill all fields!", "#ff4d4d");
            return;
        }

        if(password.length < 6) {
            showMsg("Password must be at least 6 characters!", "#ff4d4d");
            return;
        }

        signupBtn.disabled = true;
        signupBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> CREATING...';

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await set(ref(db, 'users/buyers/' + user.uid), {
                name: name,
                email: email,
                phone: phone,
                role: 'buyer',
                status: 'approved', // Buyers are usually approved by default
                uid: user.uid,
                joinedAt: new Date().toISOString()
            });

            showMsg("Account created successfully! Redirecting...", "var(--accent-blue)");
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);

        } catch (error) {
            console.error(error);
            showMsg("Signup failed: " + error.message, "#ff4d4d");
            signupBtn.disabled = false;
            signupBtn.innerHTML = "CREATE ACCOUNT";
        }
    });

    function showMsg(text, color) {
        msg.style.color = color;
        msg.innerText = text;
    }
</script>

</body>
</html>
