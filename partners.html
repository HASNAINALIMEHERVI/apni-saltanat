<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apni Saltanat | Premium Partner Program</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Aurora Background Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <div class="form-wrapper">
            
            <!-- Form Content -->
            <div id="formContent">
                <div class="header">
                    <h1>Apni Saltanat</h1>
                    <p>Elevate your business with our Partner Program</p>
                </div>
                
                <form id="partnerForm">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="name@business.com" required>
                        </div>
                        <div class="input-group">
                            <label for="contact">Contact Number</label>
                            <input type="tel" id="contact" placeholder="+92 XXX XXXXXXX" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="cnic">CNIC Number</label>
                            <input type="text" id="cnic" placeholder="XXXXX-XXXXXXX-X" required>
                        </div>
                        <div class="input-group">
                            <label for="bankNum">Bank Account / IBAN</label>
                            <input type="text" id="bankNum" placeholder="PKXX XXXX XXXX XXXX" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="district">District</label>
                        <input type="text" id="district" placeholder="e.g. Lahore, Punjab" required>
                    </div>

                    <div class="input-group">
                        <label for="address">Operational Address</label>
                        <textarea id="address" placeholder="Detail your primary business location..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Initialize Partnership</button>
                </form>
            </div>

            <!-- Success Message -->
            <div id="successMessage" style="display: none;">
                <div class="success-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h2 style="font-size: 2rem; color: #fff; margin-bottom: 0.75rem; font-weight: 700;">Application Received</h2>
                <p style="color: var(--text-dim); font-size: 1.1rem; line-height: 1.6; text-align: center;">
                    Your partnership application has been securely submitted.<br>
                    Our verification team will review your details within <br>
                    <span style="color: var(--primary); font-weight: 600;">3 to 5 business days</span>.
                </p>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('partnerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = 'Processing Application...';
            submitBtn.disabled = true;

            const newPartner = {
                id: Date.now(),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                contact: document.getElementById('contact').value,
                cnic: document.getElementById('cnic').value,
                bankNum: document.getElementById('bankNum').value,
                district: document.getElementById('district').value,
                address: document.getElementById('address').value,
                date: new Date().toLocaleDateString()
            };

            // Enhanced feedback delay for "premium" feel
            setTimeout(() => {
                let partners = JSON.parse(localStorage.getItem('partnersData')) || [];
                partners.push(newPartner);
                localStorage.setItem('partnersData', JSON.stringify(partners));

                document.getElementById('formContent').style.display = 'none';
                document.getElementById('successMessage').style.display = 'flex';
                
                // Final success animation trigger (handled by CSS fadeIn)
            }, 1200);
        });
    </script>
</body>
</html>
