<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahi Ledger | Apni Saltanat</title>
    <meta name="description" content="Apni Saltanat: Taxila ka behtareen Shahi Marketplace jahan aapko har qism ki ashya munsifana qeemat par milti hain.">
<meta name="keywords" content="Apni Saltanat, Shahi Bazaar, Marketplace Pakistan, Taxila Shopping, Bablu Architect">
<link rel="canonical" href="https://apnisaltanat.com/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --shahi-blue: #2196f3; --shahi-gold: #ffcc00; --danger: #ff4444; --success: #00ff88; --card-bg: #1a1a1e; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0c; color: white; margin: 0; padding: 20px; }
        .ledger-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; padding-bottom: 20px; margin-bottom: 30px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        
        .month-select { background: var(--card-bg); color: white; border: 1px solid #333; padding: 10px 15px; border-radius: 10px; outline: none; font-weight: 700; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .stat-val { font-size: 32px; font-weight: 900; color: var(--success); font-family: 'Outfit'; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 5px; }

        .ledger-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 20px; overflow: hidden; margin-bottom: 50px; }
        th { text-align: left; padding: 20px; color: #555; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #333; }
        td { padding: 20px; border-bottom: 1px solid #222; font-size: 14px; }
        
        .btn { border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-paid { background: rgba(0,255,136,0.1); color: var(--success); border: 1px solid var(--success); }
        .btn-unpaid { background: rgba(255,68,68,0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-freeze { background: var(--shahi-gold); color: #000; padding: 12px 25px; font-size: 13px; }
        .btn-frozen { background: #333; color: #888; cursor: not-allowed; }

        .frozen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); pointer-events: none; }
        tr.frozen { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

<div class="ledger-header">
    <h2 style="font-family:'Outfit';">SHAHI LEDGER 📜</h2>
    <div class="controls">
        <select id="monthYear" class="month-select"></select>
        <button id="freezeBtn" class="btn btn-freeze"><i class="fas fa-lock"></i> FREEZE RECORD</button>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="totalIncome">Rs. 0</div><div class="stat-label">Total Monthly Income</div></div>
    <div class="stat-card"><div class="stat-val" id="paidCount">0</div><div class="stat-label">Paid Sellers</div></div>
</div>

<table class="ledger-table">
    <thead>
        <tr>
            <th>Seller Info</th>
            <th>Contact</th>
            <th>Address</th>
            <th>Monthly Fee (Rs. 1000)</th>
        </tr>
    </thead>
    <tbody id="sellerList">
        <tr><td colspan="4" style="text-align:center">Ledger load ho raha hai...</td></tr>
    </tbody>
</table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCsIZ_H0sJddEkiPHfuMPlLNvjxn-1Jzbc",
        authDomain: "apnisaltanat.com",
        databaseURL: "https://apni-saltanat-default-rtdb.firebaseio.com",
        projectId: "apni-saltanat",
        storageBucket: "apni-saltanat.firebasestorage.app",
        messagingSenderId: "691941073239",
        appId: "1:691941073239:web:9e0b568eccc347a0c0de12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const monthSelect = document.getElementById('monthYear');
    const freezeBtn = document.getElementById('freezeBtn');
    
    // Generate months
    const now = new Date();
    for(let i=0; i<12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
        const label = d.toLocaleString('default', { month: 'long', year: 'numeric' });
        monthSelect.innerHTML += `<option value="${val}">${label}</option>`;
    }

    let isFrozen = false;
    let sellersData = {};
    let monthlyRecord = {};

    function loadLedger() {
        const period = monthSelect.value;
        
        // 1. Check if period is frozen
        onValue(ref(db, `shahi_ledger/${period}/status`), (snap) => {
            isFrozen = snap.val() === 'frozen';
            if(isFrozen) {
                freezeBtn.innerHTML = '<i class="fas fa-snowflake"></i> RECORD FROZEN';
                freezeBtn.className = 'btn btn-frozen';
                freezeBtn.disabled = true;
            } else {
                freezeBtn.innerHTML = '<i class="fas fa-lock"></i> FREEZE RECORD';
                freezeBtn.className = 'btn btn-freeze';
                freezeBtn.disabled = false;
            }
        });

        // 2. Load monthly payments
        onValue(ref(db, `shahi_ledger/${period}/payments`), (snap) => {
            monthlyRecord = snap.val() || {};
            renderTable();
        });

        // 3. Load all sellers
        onValue(ref(db, 'users/sardaars'), (snap) => {
            sellersData = snap.val() || {};
            renderTable();
        });
    }

    function renderTable() {
        const tbody = document.getElementById('sellerList');
        let html = '';
        let income = 0;
        let paid = 0;

        Object.entries(sellersData).forEach(([uid, s]) => {
            const hasPaid = monthlyRecord[uid] === true;
            if(hasPaid) { income += 1000; paid++; }

            html += `<tr class="${isFrozen?'frozen':''}">
                <td><b>${s.userName || s.name || 'Sardaar'}</b><br><small style="color:#666">${s.email}</small></td>
                <td>${s.phone || 'N/A'}</td>
                <td>${s.address || 'N/A'}</td>
                <td>
                    <button class="btn ${hasPaid?'btn-paid':'btn-unpaid'}" onclick="markPaid('${uid}', ${hasPaid})" ${isFrozen?'disabled':''}>
                        <i class="fas ${hasPaid?'fa-check-circle':'fa-circle'}"></i>
                        ${hasPaid?'PAID':'MARK PAID'}
                    </button>
                </td>
            </tr>`;
        });

        tbody.innerHTML = html || '<tr><td colspan="4">No sellers found.</td></tr>';
        document.getElementById('totalIncome').innerText = `Rs. ${income}`;
        document.getElementById('paidCount').innerText = paid;
    }

    window.markPaid = async (uid, current) => {
        if(isFrozen) return;
        const period = monthSelect.value;
        const msg = !current ? "Sultan, Rs. 1000 receive ho gaye?" : "Payment record remove kar dein?";
        if(confirm(msg)) {
            try {
                // Update shahi_ledger
                await set(ref(db, `shahi_ledger/${period}/payments/${uid}`), !current);
                
                // Also update user's monthly_status for convenience
                await update(ref(db, `users/sardaars/${uid}/monthly_ledger/${period}`), {
                    paid: !current,
                    amount: !current ? 1000 : 0,
                    date: new Date().toISOString()
                });

                console.log("Payment status updated for", uid);
            } catch (e) {
                alert("Update failed: " + e.message);
            }
        }
    };

    freezeBtn.onclick = () => {
        const period = monthSelect.value;
        const label = monthSelect.options[monthSelect.selectedIndex].text;
        if(confirm(`Sultan, kya aap ${label} ka record hamesha ke liye FREEZE karna chahte hain? Iske baad koi tabdeeli nahi ho sakegi.`)) {
            update(ref(db, `shahi_ledger/${period}`), { status: 'frozen' });
        }
    };

    monthSelect.onchange = loadLedger;
    loadLedger();

</script>
</body>
</html>
