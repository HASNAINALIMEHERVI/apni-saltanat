<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | Apni Saltanat</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff88">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #0a0a0c;
            --accent-blue: #2196f3;
            --border-color: #eeeeee;
            --shadow-md: 0 10px 25px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); padding: 20px; }

        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Outfit'; font-weight: 900; }
        .header a { text-decoration: none; color: var(--accent-blue); font-weight: 700; font-size: 14px; }

        .cart-list { display: flex; flex-direction: column; gap: 15px; }
        .cart-item { background: #fff; padding: 15px; border-radius: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow-sm); }
        .cart-item img { width: 70px; height: 70px; object-fit: contain; border-radius: 10px; background: #f9f9f9; }
        .item-info { flex: 1; }
        .item-info h3 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
        .item-info p { font-size: 14px; color: #666; font-weight: 700; }
        .remove-btn { color: #ff4d4d; cursor: pointer; font-size: 18px; padding: 10px; }

        .cart-summary { background: #fff; padding: 25px; border-radius: 25px; border: 1px solid var(--border-color); margin-top: 30px; box-shadow: var(--shadow-md); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700; }
        .total-row { font-size: 20px; font-weight: 900; border-top: 1px solid #eee; pt: 15px; margin-top: 15px; }

        .checkout-form { background: #fff; padding: 25px; border-radius: 25px; border: 1px solid var(--border-color); margin-top: 20px; display: none; flex-direction: column; gap: 15px; box-shadow: var(--shadow-md); }
        .checkout-form input { padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 14px; }

        .checkout-btn { width: 100%; padding: 18px; background: #1a1a1e; color: #fff; border: none; border-radius: 15px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: var(--transition); margin-top: 20px; }
        .checkout-btn:hover { background: #000; transform: translateY(-3px); }

        @media (max-width: 600px) {
            .cart-item { flex-direction: row; align-items: center; }
            .item-info h3 { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MY <span>CART</span></h1>
        <a href="index.html"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    </div>

    <div id="cartList" class="cart-list">
        <!-- Items will be loaded here -->
    </div>

    <div id="cartEmpty" style="display:none; text-align:center; padding: 50px 0;">
        <i class="fas fa-shopping-basket" style="font-size: 50px; color: #eee; margin-bottom: 20px;"></i>
        <h3>Your cart is empty</h3>
        <p style="color:#888; margin-top:10px;">Go back to the bazaar to add items!</p>
    </div>

    <div id="cartSummary" class="cart-summary" style="display:none;">
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">Rs. 0</span></div>
        <div class="summary-row"><span>Shipping</span><span>Calculated at Checkout</span></div>
        <div class="summary-row total-row"><span>Total</span><span id="total">Rs. 0</span></div>
        
        <div id="checkoutForm" class="checkout-form">
            <h3 style="font-family:'Outfit'; margin-bottom:10px;">📋 Order Details</h3>
            <p style="font-size:13px; color:#666; margin-bottom:10px;">Please fill in your details to finalize your shahi orders.</p>
            <input type="text" id="custName" placeholder="Full Name" required>
            <input type="text" id="custAddress" placeholder="Complete Address" required>
            <input type="tel" id="custPhone" placeholder="Contact Number" required>
            <input type="text" id="custPostal" placeholder="Postal Code">
            <input type="email" id="custEmail" placeholder="Email Address">
        </div>

        <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCsIZ_H0sJddEkiPHfuMPlLNvjxn-1Jzbc",
        authDomain: "apnisaltanat.com",
        databaseURL: "https://apni-saltanat-default-rtdb.firebaseio.com",
        projectId: "apni-saltanat",
        storageBucket: "apni-saltanat.firebasestorage.app",
        messagingSenderId: "691941073239",
        appId: "1:691941073239:web:9e0b568eccc347a0c0de12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwo6smhEV8TWPrWdBJ3SCFFj96AL6ucGHR4dRMAfCX5EpFSJuQnIwgMHmoWbzLaawzb/exec"; // Notification script

    let cart = JSON.parse(localStorage.getItem('saltanatCart')) || [];
    let currentUser = null;
    let isFormVisible = false;

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
    });

    window.renderCart = function() {
        const list = document.getElementById('cartList');
        const summary = document.getElementById('cartSummary');
        const empty = document.getElementById('cartEmpty');

        if (cart.length === 0) {
            list.innerHTML = '';
            summary.style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        summary.style.display = 'block';

        let total = 0;
        list.innerHTML = cart.map((item, index) => {
            total += parseInt(item.price);
            return `
                <div class="cart-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>Rs. ${item.price}</p>
                    </div>
                    <i class="fas fa-trash-alt remove-btn" onclick="removeItem(${index})"></i>
                </div>
            `;
        }).join('');

        document.getElementById('subtotal').innerText = `Rs. ${total}`;
        document.getElementById('total').innerText = `Rs. ${total}`;
    }

    window.removeItem = (index) => {
        cart.splice(index, 1);
        localStorage.setItem('saltanatCart', JSON.stringify(cart));
        window.renderCart();
    };

    document.getElementById('checkoutBtn').onclick = async () => {
        if (!currentUser) {
            alert("Please login first to place orders.");
            window.location.href = "login.html";
            return;
        }

        if (!isFormVisible) {
            document.getElementById('checkoutForm').style.display = 'flex';
            document.getElementById('checkoutBtn').innerText = "Place All Orders Now";
            isFormVisible = true;
            return;
        }

        const name = document.getElementById('custName').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const postal = document.getElementById('custPostal').value.trim() || "N/A";
        const email = document.getElementById('custEmail').value.trim() || "N/A";

        if (!name || !address || !phone) {
            alert("Sultan, please fill all delivery details!");
            return;
        }

        const btn = document.getElementById('checkoutBtn');
        btn.disabled = true;
        btn.innerText = "Placing Orders...";

        try {
            // Grouping and sending orders to each seller
            for (const item of cart) {
                const sID = item.sellerId || item.seller;
                if (!sID) continue;

                const orderData = {
                    productName: item.name,
                    productPrice: item.price,
                    productId: item.id,
                    customerName: name,
                    customerAddress: address,
                    customerPhone: phone,
                    customerPostal: postal,
                    customerEmail: email,
                    sellerId: sID,
                    timestamp: Date.now(),
                    status: 'new'
                };
                
                // Save to Firebase
                const { get, ref: dbRef } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
                const newOrderRef = push(ref(db, `orders/${sID}`));
                await set(newOrderRef, orderData);

                // Send email notification if seller email exists
                const sellerSnap = await get(ref(db, `users/sardaars/${sID}`));
                if (sellerSnap.exists()) {
                    const sellerData = sellerSnap.val();
                    if (sellerData.email) {
                        fetch(scriptUrl, {
                            method: "POST",
                            mode: "no-cors",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                sellerEmail: sellerData.email,
                                productName: orderData.productName,
                                productPrice: orderData.productPrice,
                                customerName: orderData.customerName,
                                customerPhone: orderData.customerPhone,
                                customerAddress: orderData.customerAddress
                            })
                        }).catch(e => console.error("Email notification failed for seller:", sID, e));
                    }
                }
            }
            alert("Congratulations Sultan! Your orders have been sent to all respective sellers.it will be dilevered to you in 3-5 working days");
            localStorage.removeItem('saltanatCart');
            cart = [];
            window.location.href = "index.html";
        } catch (error) {
            console.error(error);
            alert("Order failed: " + error.message);
            btn.disabled = false;
            btn.innerText = "Place All Orders Now";
        }
    };

    window.renderCart();
</script>

</body>
</html>
