<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Control | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --shahi-green: #00ff88; --danger-red: #ff4444; --deep-bg: #0a0a0c; --card: #141417; }
        body { font-family: 'Inter', sans-serif; background: var(--deep-bg); color: white; margin: 0; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .search-box { flex: 1; max-width: 400px; position: relative; }
        .search-box input { width: 100%; padding: 12px 15px; background: #1a1a1e; border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
        .user-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1a1a1e; color: var(--shahi-green); font-size: 11px; text-transform: uppercase; }
        .role-badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .role-sardaar { background: #ffcc00; color: #000; }
        .role-buyer { background: #0088ff; color: #fff; }
        .status-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 110px; }
        .btn-active { background: rgba(0, 255, 136, 0.1); color: var(--shahi-green); border: 1px solid var(--shahi-green); }
        .btn-blocked { background: rgba(255, 68, 68, 0.1); color: var(--danger-red); border: 1px solid var(--danger-red); }
    </style>
</head>
<body>

<div class="admin-header">
    <h2><i class="fas fa-users-cog"></i> USER CONTROL CENTER</h2>
    <div class="search-box">
        <input type="text" id="userSearch" placeholder="Naam ya Email se talash karein...">
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button style="background:var(--shahi-green); border:none; padding:10px 20px; font-weight:bold; cursor:pointer; border-radius:5px;" onclick="downloadExcel()">DOWNLOAD EXCEL</button>
        <a href="admin_hub.html" style="background:#333; color:white; padding:10px 20px; text-decoration:none; border-radius:5px; font-weight:bold;">BACK TO HUB</a>
    </div>
</div>

<div id="debug-info" style="color:yellow; font-size:12px; margin-bottom:10px;"></div>

<table class="user-table" id="userTable">
    <thead>
        <tr>
            <th>User Info</th>
            <th>Role</th>
            <th>Current Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="userList">
        <tr><td colspan="4" style="text-align:center; padding:50px;">Darbari records scan ho rahe hain...</td></tr>
    </tbody>
</table>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 1. Firebase Initialize
    const firebaseConfig1 = {
        apiKey: "AIzaSyCsIZ_H0sJddEkiPHfuMPlLNvjxn-1Jzbc",
        authDomain: "apnisaltanat.com",
        databaseURL: "https://apni-saltanat-default-rtdb.firebaseio.com",
        projectId: "apni-saltanat",
        storageBucket: "apni-saltanat.firebasestorage.app",
        messagingSenderId: "691941073239",
        appId: "1:691941073239:web:9e0b568eccc347a0c0de12"
    };

    const app1 = initializeApp(firebaseConfig1);
    const db1 = getDatabase(app1);
    const auth = getAuth(app1);
    const SULTAN_UID = "qnWFjg3XNlO7jHDhz84bPJMikP72";

    let allUsers = [];

    // 2. Sultan Auth Guard & Data Trigger
    onAuthStateChanged(auth, (user) => {
        const debug = document.getElementById('debug-info');
        if (user && user.uid === SULTAN_UID) {
            debug.innerText = "Welcome Sultan. Accessing imperial records...";
            loadAllUsers(); // Verification ke baad data load karein
        } else {
            alert("Access Denied! Only the Sultan can access this chamber.");
            window.location.href = "login.html";
        }
    });

    // 3. Load Data Function
    async function loadAllUsers() {
        const processSnapshot = (snapshot, role) => {
            if(snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach(id => {
                    const existingIdx = allUsers.findIndex(u => u.uid === id);
                    const userData = { 
                        uid: id, 
                        ...data[id], 
                        path: `users/${role === 'SARDAAR' ? 'sardaars' : 'buyers'}/${id}`, 
                        displayRole: role
                    };
                    if(existingIdx === -1) {
                        allUsers.push(userData);
                    } else {
                        allUsers[existingIdx] = userData;
                    }
                });
                renderTable(allUsers);
            }
        };

        // DB listeners
        onValue(ref(db1, 'users/sardaars'), (s) => processSnapshot(s, 'SARDAAR'));
        onValue(ref(db1, 'users/buyers'), (s) => processSnapshot(s, 'BUYER'));
    }

    // 4. Render Table logic (English Updated)
    function renderTable(data) {
        const list = document.getElementById('userList');
        if (!data || data.length === 0) {
            list.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px;">No records found, Sultan.</td></tr>';
            return;
        }
        
        list.innerHTML = data.map(user => {
            const isBlocked = user.status === 'blocked';
            const roleClass = user.displayRole === 'SARDAAR' ? 'role-sardaar' : 'role-buyer';
            
            return `
                <tr>
                    <td>
                        <b>${user.name || user.userName || 'N/A'}</b><br>
                        <small style="color:#777">${user.email || 'No Email'}</small>
                    </td>
                    <td><span class="role-badge ${roleClass}">${user.displayRole}</span></td>
                    <td>
                        <span style="color: ${isBlocked ? '#ff4444' : '#00ff88'}; font-weight:bold;">
                            ${isBlocked ? '🛑 BLOCKED' : '✅ ACTIVE'}
                        </span>
                    </td>
                    <td>
                        <button class="status-btn ${isBlocked ? 'btn-active' : 'btn-blocked'}" 
                                onclick="window.toggleAccount('${user.path}', '${isBlocked ? 'active' : 'blocked'}')">
                            ${isBlocked ? 'UNBLOCK' : 'BLOCK'}
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // 5. Action Logic: Toggle Block/Unblock
    window.toggleAccount = async (fullPath, newStatus) => {
        const confirmMsg = newStatus === 'blocked' 
            ? "Sultan, are you sure you want to BLOCK this user?" 
            : "Sultan, should we UNBLOCK this user?";
            
        if(!confirm(confirmMsg)) return;

        try {
            await update(ref(db1, fullPath), { status: newStatus });
            alert('Imperial decree updated! Status changed.');
        } catch (err) {
            console.error('Update error:', err);
            alert('Decree failed: ' + err.message);
        }
    };

    // Search Logic
    document.getElementById('userSearch').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allUsers.filter(u => 
            (u.name || u.userName || "").toLowerCase().includes(term) || 
            (u.email || "").toLowerCase().includes(term)
        );
        renderTable(filtered);
    });

    // Excel Export
    window.downloadExcel = () => {
        const table = document.getElementById("userTable");
        const wb = XLSX.utils.table_to_book(table, { sheet: "Users" });
        XLSX.writeFile(wb, "Imperial_User_Report.xlsx");
    };

</script>
</body>
</html>
